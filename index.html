<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DW4 Cenografia — Portfólio de Projetos</title>
  <meta name="description" content="Portfólio de projetos da DW4 Cenografia — mais de 40 anos transformando ideias em cenários e experiências inesquecíveis." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=2" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <a href="#" class="logo-link">
        <img
          src="https://dw4cenografia.com.br/wp-content/uploads/2024/02/dw4-cenografia-footer.png"
          alt="DW4 Cenografia"
          class="logo"
          onerror="this.style.display='none'; document.getElementById('logo-text').style.display='block';"
        />
        <span id="logo-text" class="logo-text" style="display:none;">DW4 Cenografia</span>
      </a>
      <p class="tagline">Transformamos ideias e sonhos em cenários e experiências inesquecíveis</p>
    </div>
  </header>

  <!-- FILTERS -->
  <section class="filters-section">
    <div class="filters-inner">
      <div class="filters-scroll">
        <button class="filter-btn active" data-filter="all">Todos</button>
        <button class="filter-btn" data-filter="Licenciados">Licenciados</button>
        <button class="filter-btn" data-filter="Natal">Natal</button>
        <button class="filter-btn" data-filter="Televisão">Televisão</button>
        <button class="filter-btn" data-filter="Parques Temáticos">Parques Temáticos</button>
        <button class="filter-btn" data-filter="Tematizações em Shopping Center">Shopping Centers</button>
        <button class="filter-btn" data-filter="Restauração">Restauração</button>
        <button class="filter-btn" data-filter="Congressos e Feiras">Congressos e Feiras</button>
      </div>
    </div>
  </section>

  <!-- PROJECTS GRID -->
  <main class="projects-section">
    <h2 class="section-title">Veja os projetos em detalhes</h2>
    <div class="projects-grid" id="projects-grid">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Carregando projetos…</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-cta-text">Quer levar uma experiência dessas para o seu shopping?</p>
      <div class="footer-buttons">
        <a
          href="https://api.whatsapp.com/send/?phone=5521964948913"
          target="_blank"
          rel="noopener"
          class="btn-footer btn-whatsapp"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          WhatsApp
        </a>
        <a
          href="mailto:contato@dw4cenografia.com.br"
          class="btn-footer btn-email"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          E-mail
        </a>
      </div>
      <p class="footer-copy">© 2026 DW4 Cenografia — Todos os direitos reservados</p>
    </div>
  </footer>

  <!-- PROJECT MODAL -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal-container">
      <button class="modal-close" id="modal-close" aria-label="Fechar">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <button class="modal-nav modal-prev" id="modal-prev" aria-label="Projeto anterior">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="modal-nav modal-next" id="modal-next" aria-label="Próximo projeto">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <div class="modal-content" id="modal-content"></div>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox-overlay" id="lightbox-overlay" aria-hidden="true">
    <button class="lightbox-close" id="lightbox-close" aria-label="Fechar foto">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" aria-label="Foto anterior">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lightbox-nav lightbox-next" id="lightbox-next" aria-label="Próxima foto">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
  </div>

  <script src="js/main.js"></script>
  <script>
    // Redireciona tokens do Netlify Identity para o painel admin
    if (window.location.hash && window.location.hash.includes('invite_token=')) {
      window.location.href = '/admin' + window.location.hash;
    }
    if (window.location.hash && window.location.hash.includes('recovery_token=')) {
      window.location.href = '/admin' + window.location.hash;
    }
  </script>
</body>
</html>
