backend:
  name: github
  repo: thiagofsleone-dw4/dw4-portfolio
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: "images"
public_folder: "/images"

collections:
  - name: "settings"
    label: "Configurações"
    files:
      - name: "filters"
        label: "Ordem dos Filtros"
        file: "content/filters.json"
        fields:
          - label: "Categorias (arraste para reordenar)"
            name: "categories"
            widget: "list"
            hint: "A ordem aqui define a ordem dos botões de filtro no site"
            field:
              label: "Categoria"
              name: "category"
              widget: "string"

  - name: "projects"
    label: "Projetos"
    folder: "content/projects"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Nome do Projeto", name: "title", widget: "string" }
      - label: "Categorias"
        name: "categories"
        widget: "list"
        hint: "Adicione, edite ou remova categorias livremente"
        field:
          label: "Categoria"
          name: "category"
          widget: "string"
      - { label: "Descrição", name: "description", widget: "text" }
      - { label: "Imagem de Capa", name: "cover", widget: "image" }
      - { label: "Link do YouTube (embed)", name: "youtube", widget: "string", required: false, hint: "Ex: https://www.youtube.com/embed/XXXXXXXXXXX" }
      - label: "Galeria de Fotos"
        name: "gallery"
        widget: "list"
        field:
          label: "Foto"
          name: "image"
          widget: "image"
      - { label: "Ordem de exibição", name: "order", widget: "number", default: 99 }
      - { label: "Publicado", name: "published", widget: "boolean", default: true }
